apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-pipeline-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: gitops-pipeline
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gitops-pipeline
  source:
    repoURL: https://github.com/Vinicius-Costa14/gitops-pipeline.git
    targetRevision: main
    path: k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-pipeline-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-pipeline-production
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: gitops-pipeline
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gitops-pipeline
  source:
    repoURL: https://github.com/Vinicius-Costa14/gitops-pipeline.git
    targetRevision: main
    path: k8s/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-pipeline-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
