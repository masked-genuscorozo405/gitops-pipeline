name: CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'k8s/**'

env:
  ARGOCD_SERVER: argocd.example.com
  APP_NAME: gitops-pipeline

jobs:
  validate-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | \
            tar xz -C /usr/local/bin

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Validate base manifests
        run: |
          kustomize build k8s/base | kubeconform -strict -summary \
            -kubernetes-version 1.29.0 \
            -output json

      - name: Validate staging overlay
        run: |
          kustomize build k8s/overlays/staging | kubeconform -strict -summary \
            -kubernetes-version 1.29.0 \
            -output json

      - name: Validate production overlay
        run: |
          kustomize build k8s/overlays/production | kubeconform -strict -summary \
            -kubernetes-version 1.29.0 \
            -output json

  diff-manifests:
    name: Diff Manifests (Dry Run)
    runs-on: ubuntu-latest
    needs: validate-manifests
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Show staging diff
        run: |
          echo "=== Staging Manifests ==="
          kustomize build k8s/overlays/staging

      - name: Show production diff
        run: |
          echo "=== Production Manifests ==="
          kustomize build k8s/overlays/production

  sync-argocd:
    name: Sync ArgoCD Application
    runs-on: ubuntu-latest
    needs: [validate-manifests, diff-manifests]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Sync staging
        if: success()
        run: |
          echo "::notice::ArgoCD auto-sync habilitado para staging."
          echo "Com auto-sync, o ArgoCD detecta a mudanca no repo e aplica automaticamente."
          echo ""
          echo "Para sync manual:"
          echo "  argocd app sync ${APP_NAME}-staging --server ${ARGOCD_SERVER}"
          echo "  argocd app wait ${APP_NAME}-staging --health --timeout 300"

      - name: Sync production (manual gate)
        if: success()
        run: |
          echo "::notice::Production requer aprovacao manual no environment 'production'."
          echo ""
          echo "Para sync manual:"
          echo "  argocd app sync ${APP_NAME}-production --server ${ARGOCD_SERVER}"
          echo "  argocd app wait ${APP_NAME}-production --health --timeout 300"

      - name: Verify deployment health
        run: |
          echo "::notice::Verificacao de saude do deploy via ArgoCD"
          echo ""
          echo "Comandos de verificacao:"
          echo "  argocd app get ${APP_NAME}-staging"
          echo "  argocd app get ${APP_NAME}-production"
          echo "  kubectl get pods -n gitops-pipeline"
